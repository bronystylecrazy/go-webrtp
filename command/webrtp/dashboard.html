<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebRTP Dashboard</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #09111b;
            --panel: rgba(12, 21, 34, 0.92);
            --line: rgba(148, 163, 184, 0.18);
            --text: #e5eefb;
            --muted: #8fa3bc;
            --accent: #38bdf8;
            --good: #34d399;
            --warn: #f59e0b;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, rgba(56, 189, 248, 0.14), transparent 30%),
                linear-gradient(180deg, #08111b, #020617);
            color: var(--text);
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            padding: 20px;
        }

        .page {
            display: grid;
            gap: 16px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: end;
            gap: 16px;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .title {
            margin: 0;
            font-size: clamp(1.2rem, 2vw, 1.8rem);
        }

        .meta {
            color: var(--muted);
            font-size: 0.92rem;
        }

        .panel {
            border: 1px solid var(--line);
            border-radius: 18px;
            background: var(--panel);
            backdrop-filter: blur(18px);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: rgba(15, 23, 42, 0.96);
        }

        th, td {
            padding: 12px 14px;
            text-align: left;
            border-bottom: 1px solid var(--line);
            white-space: nowrap;
            font-size: 0.92rem;
        }

        th {
            color: var(--muted);
            font-weight: 600;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        tbody tr:hover {
            background: rgba(56, 189, 248, 0.05);
        }

        .status-ready { color: var(--good); }
        .status-waiting { color: var(--warn); }

        .empty {
            padding: 24px;
            color: var(--muted);
        }

        @media (max-width: 1100px) {
            body { padding: 12px; }
            .panel { overflow-x: auto; }
        }
    </style>
</head>
<body>
<main class="page">
    <header class="header">
        <div>
            <h1 class="title">WebRTP Dashboard</h1>
            <div class="meta">Live stream table matching the active TUI view</div>
        </div>
        <div class="controls">
            <label class="meta">
                <input id="show-all" type="checkbox">
                Show all streams
            </label>
            <div class="meta" id="connection-state">Connecting...</div>
        </div>
    </header>

    <section class="panel">
        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Status</th>
                    <th>Codec</th>
                    <th>Resolution</th>
                    <th>Framerate</th>
                    <th>Bitrate</th>
                    <th>Bandwidth</th>
                    <th>Frames</th>
                    <th>Clients</th>
                    <th>Uptime</th>
                </tr>
            </thead>
            <tbody id="rows"></tbody>
        </table>
        <div id="empty" class="empty" hidden>No active streams</div>
    </section>
</main>

<script>
    function formatBytes(bytes) {
        const value = Number(bytes || 0);
        if (value < 1024) return `${value} B`;
        const units = ['KB', 'MB', 'GB', 'TB'];
        let size = value / 1024;
        let unit = units[0];
        for (let i = 1; i < units.length && size >= 1024; i++) {
            size /= 1024;
            unit = units[i];
        }
        return `${size.toFixed(size >= 10 ? 0 : 1)} ${unit}`;
    }

    let allRows = [];

    function renderRows() {
        const tbody = document.getElementById('rows');
        const empty = document.getElementById('empty');
        const showAll = document.getElementById('show-all').checked;
        const rows = showAll ? allRows : allRows.filter((row) => row.active);
        if (!rows || rows.length === 0) {
            tbody.innerHTML = '';
            empty.hidden = false;
            return;
        }
        empty.hidden = true;
        tbody.innerHTML = rows.map((row) => `
            <tr>
                <td>${row.name}</td>
                <td class="status-${row.status.toLowerCase()}">${row.status}</td>
                <td>${row.codec || '-'}</td>
                <td>${row.resolution || '-'}</td>
                <td>${Math.round(row.framerate || 0)} fps</td>
                <td>${Math.round(row.bitrateKbps || 0)} kbps</td>
                <td>${formatBytes(row.bandwidthBytes || 0)}</td>
                <td>${row.frames || 0}</td>
                <td>${row.clients || 0}</td>
                <td>${row.uptime || '-'}</td>
            </tr>
        `).join('');
    }

    function main() {
        const protocol = location.protocol === 'https:' ? 'wss' : 'ws';
        const state = document.getElementById('connection-state');
        let reconnectDelay = 1000;
        let timer = null;
        let ws = null;

        const connect = () => {
            ws = new WebSocket(`${protocol}://${location.host}/ws/dashboard`);
            ws.onopen = () => {
                state.textContent = 'Live';
                reconnectDelay = 1000;
            };
            ws.onmessage = (event) => {
                const message = JSON.parse(event.data);
                allRows = message.rows || [];
                renderRows();
            };
            ws.onclose = () => {
                state.textContent = 'Reconnecting...';
                clearTimeout(timer);
                timer = setTimeout(connect, reconnectDelay);
                reconnectDelay = Math.min(reconnectDelay * 2, 5000);
            };
            ws.onerror = () => {
                if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) {
                    ws.close();
                }
            };
        };

        document.getElementById('show-all').addEventListener('change', () => {
            renderRows();
        });
        connect();
        window.addEventListener('beforeunload', () => {
            clearTimeout(timer);
            if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) {
                ws.close();
            }
        }, {once: true});
    }

    main();
</script>
</body>
</html>
