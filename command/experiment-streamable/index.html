<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RTSP Stream</title>
    <style>
        body { margin: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: sans-serif; color: #fff; gap: 12px; }
        video { width: 640px; max-width: 100%; background: #111; }
        #status { font-size: 13px; color: #aaa; }
    </style>
</head>
<body>
<video id="v" autoplay muted playsinline controls></video>
<div id="status">Loading…</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.7/hls.min.js"></script>
<script>
    const video  = document.getElementById('v');
    const status = document.getElementById('status');

    if (Hls.isSupported()) {
        const hls = new Hls({ lowLatencyMode: true });
        hls.loadSource('/hls/index.m3u8');
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, () => {
            status.textContent = 'Playing';
            video.play();
        });
        hls.on(Hls.Events.ERROR, (_, data) => {
            if (data.fatal) status.textContent = 'Error: ' + data.details;
        });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        // Safari native HLS
        video.src = '/hls/index.m3u8';
        video.addEventListener('loadedmetadata', () => video.play());
        status.textContent = 'Playing (native HLS)';
    } else {
        status.textContent = 'HLS not supported in this browser';
    }
</script>
</body>
</html>
